name: Deploy to CHR site

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

  deploy:
    name: Deploy to A2 Hosting
    runs-on: ubuntu-latest
    needs: build  # ← waits for build to pass first
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  # ← skip on PRs

    steps:
      - name: Debug secrets
        run: |
          echo "SSH_PRIVATE_KEY is set: ${{ secrets.SSH_PRIVATE_KEY != '' }}"
          echo "REMOTE_HOST is set: ${{ secrets.REMOTE_HOST != '' }}"
          echo "REMOTE_USER is set: ${{ secrets.REMOTE_USER != '' }}"
          echo "TARGET_DIR is set: ${{ secrets.TARGET_DIR != '' }}"

      - name: Checkout the files
        uses: actions/checkout@v4

      - name: Deploy files to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.TARGET_DIR }}
          EXCLUDE: "/sites/default/files/, /sites/default/settings.php, /sites/default/services.yml, /.env, /vendor/"

      - name: Run post-deploy Drupal commands
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.REMOTE_HOST }}      # ← unified secret name
          username: ${{ secrets.REMOTE_USER }}  # ← unified secret name
          key: ${{ secrets.SSH_PRIVATE_KEY }}   # ← unified secret name
          script: |
            cd ${{ secrets.TARGET_DIR }}
            /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader
            drush deploy  # runs updatedb, config:import, cache:rebuild in one
            echo "** Finished CHR Deployment **"